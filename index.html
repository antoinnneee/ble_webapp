<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris BLE Controller</title>
    <!-- Utilisation de Tailwind CSS pour un design moderne et rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        .gamepad-btn {
            @apply flex items-center justify-center bg-slate-700 hover:bg-slate-600 active:bg-blue-600 text-white rounded-2xl shadow-lg transition-all active:scale-95 border border-slate-600 select-none;
        }
        .dpad-btn {
            @apply w-16 h-16;
        }
        .action-btn {
            @apply w-20 h-20 rounded-full bg-blue-600 hover:bg-blue-500 shadow-[0_0_20px_rgba(37,99,235,0.4)];
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans overflow-hidden">

    <!-- Section Connexion -->
    <div id="sectionConnexion" class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700 text-center transition-all duration-500">
        <div class="mx-auto w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mb-6 text-blue-400">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-white mb-2">Tetris Controller</h1>
        <p class="text-slate-400 mb-8 text-sm">Connectez-vous à votre appareil BLE pour jouer.</p>

        <button id="boutonScan" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(37,99,235,0.4)]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            Scanner et Connecter
        </button>

        <div id="resultat" class="mt-8 text-left bg-slate-900/50 p-5 rounded-2xl border border-slate-700 hidden"></div>
    </div>

    <!-- Section Contrôleur (Cachée par défaut) -->
    <div id="sectionController" class="hidden w-full max-w-lg transition-all duration-700 opacity-0 transform translate-y-10">
        <div class="bg-slate-800 rounded-[3rem] p-10 shadow-2xl border-4 border-slate-700 relative overflow-hidden">
            <!-- Décoration "Gamer" -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>
            
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="nomAppareil" class="text-xl font-bold text-white">Manette Connectée</h2>
                    <p class="text-xs text-blue-400 flex items-center gap-1">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Connecté via BLE
                    </p>
                </div>
                <button id="boutonDeconnecter" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">Déconnecter</button>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-12">
                <!-- D-Pad -->
                <div class="grid grid-cols-3 gap-2 p-4 bg-slate-900/50 rounded-3xl border border-slate-700">
                    <div></div>
                    <button id="btnUp" class="gamepad-btn dpad-btn">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
                    </button>
                    <div></div>
                    
                    <button id="btnLeft" class="gamepad-btn dpad-btn">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div class="w-16 h-16 flex items-center justify-center opacity-20 text-slate-500">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"></circle></svg>
                    </div>
                    <button id="btnRight" class="gamepad-btn dpad-btn">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                    
                    <div></div>
                    <button id="btnDown" class="gamepad-btn dpad-btn">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div></div>
                </div>

                <!-- Action Button -->
                <div class="flex flex-col items-center gap-4">
                    <button id="btnRotate" class="gamepad-btn action-btn group">
                        <svg class="w-10 h-10 group-active:rotate-90 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <span class="text-xs font-bold text-slate-500 tracking-widest uppercase">Rotate</span>
                </div>
            </div>
            
            <div class="mt-12 text-center text-[10px] text-slate-600 uppercase tracking-widest font-bold">
                Tetris Bluetooth Web Controller v1.0
            </div>
        </div>
    </div>

    <script>
        // UUIDs pour le jeu Tetris
        const TETRIS_SERVICE_UUID = 'cb47ec20-0000-1000-8000-00805f9b34fb';
        const TETRIS_MODE_UUID = 'cb47ec21-0000-1000-8000-00805f9b34fb';
        const TETRIS_CONTROL_UUID = 'cb47ec23-0000-1000-8000-00805f9b34fb';
        // Service General pour l'advertising
        const GENERAL_SERVICE_UUID = 'cb47ec90-0000-1000-8000-00805f9b34fb';

        let gattServer = null;
        let txCharacteristic = null;
        let modeCharacteristic = null;

        const boutonScan = document.getElementById('boutonScan');
        const sectionConnexion = document.getElementById('sectionConnexion');
        const sectionController = document.getElementById('sectionController');
        const affichageResultat = document.getElementById('resultat');
        const nomAppareilLabel = document.getElementById('nomAppareil');

        boutonScan.addEventListener('click', async () => {
            affichageResultat.classList.remove('hidden');
            affichageResultat.innerHTML = '<p class="text-slate-400 animate-pulse text-center text-sm">Ouverture du scan...</p>';

            try {
                // On filtre par le nom défini dans l'ESP32 : "glougloubus"
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'glougloubus' }],
                    optionalServices: [GENERAL_SERVICE_UUID, TETRIS_SERVICE_UUID]
                });

                affichageResultat.innerHTML = '<p class="text-blue-400 text-center text-sm">Connexion à ' + device.name + '...</p>';
                
                gattServer = await device.gatt.connect();
                
                // On utilise le nouveau service Tetris dedié
                const service = await gattServer.getPrimaryService(TETRIS_SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(TETRIS_CONTROL_UUID);
                modeCharacteristic = await service.getCharacteristic(TETRIS_MODE_UUID);

                // Démarrer automatiquement le jeu (APP_MODE_TETRIS_PLAY = 2) via le modeCharacteristic
                try {
                    await modeCharacteristic.writeValue(new Uint8Array([2]));
                    console.log("Mode jeu Tetris démarré.");
                } catch(err) {
                    console.error("Erreur g_req_app_mode:", err);
                }

                // Succès -> Transition vers le contrôleur
                nomAppareilLabel.innerText = device.name || "Appareil Inconnu";
                
                sectionConnexion.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    sectionConnexion.classList.add('hidden');
                    sectionController.classList.remove('hidden');
                    setTimeout(() => {
                        sectionController.classList.remove('opacity-0', 'translate-y-10');
                    }, 50);
                }, 500);

                device.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (erreur) {
                console.error(erreur);
                affichageResultat.innerHTML = `<p class="text-rose-400 text-sm text-center">Erreur: ${erreur.message}</p>`;
            }
        });

        async function sendCommand(cmd) {
            if (!txCharacteristic) return;
            try {
                // Envoi de la commande sous forme d'octet (0 = Left, 1 = Right, etc.)
                await txCharacteristic.writeValue(new Uint8Array([cmd]));
                console.log('Envoyé (Tetris CMD):', cmd);
            } catch (err) {
                console.error('Erreur d\'envoi:', err);
            }
        }

        // Mapping des boutons selon tetris_cmd_t
        // TETRIS_CMD_LEFT = 0, TETRIS_CMD_RIGHT = 1, TETRIS_CMD_ROTATE = 2
        // TETRIS_CMD_SOFT_DROP = 3, TETRIS_CMD_HARD_DROP = 4
        document.getElementById('btnLeft').addEventListener('click', () => sendCommand(0));
        document.getElementById('btnRight').addEventListener('click', () => sendCommand(1));
        document.getElementById('btnDown').addEventListener('click', () => sendCommand(3));
        document.getElementById('btnUp').addEventListener('click', () => sendCommand(4));
        document.getElementById('btnRotate').addEventListener('click', () => sendCommand(2));

        document.getElementById('boutonDeconnecter').addEventListener('click', () => {
            if (gattServer) gattServer.disconnect();
        });

        function onDisconnected() {
            sectionController.classList.add('opacity-0', 'translate-y-10');
            setTimeout(() => {
                sectionController.classList.add('hidden');
                sectionConnexion.classList.remove('hidden');
                setTimeout(() => {
                    sectionConnexion.classList.remove('opacity-0', 'scale-95');
                    affichageResultat.innerHTML = '<p class="text-slate-400 text-center text-sm">Déconnecté</p>';
                }, 50);
            }, 500);
        }
    </script>
</body>

</html>
